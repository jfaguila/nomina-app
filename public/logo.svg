<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="NominIA">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E2438"/>
      <stop offset="1" stop-color="#0A1A2B"/>
    </linearGradient>
    <linearGradient id="lime" x1="150" y1="150" x2="380" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#BEF264"/>
      <stop offset="1" stop-color="#84CC16"/>
    </linearGradient>
  </defs>

  <!-- Squircle tile navy -->
  <rect x="32" y="32" width="448" height="448" rx="128" fill="url(#tile)"/>

  <!-- Subtle rising bars (payslip going up) -->
  <rect x="150" y="300" width="34" height="62"  rx="12" fill="#1E3A52"/>
  <rect x="202" y="262" width="34" height="100" rx="12" fill="#27496A"/>
  <rect x="254" y="214" width="34" height="148" rx="12" fill="#33597E"/>

  <!-- Lime check-arrow rising (you get what you deserve) -->
  <path d="M150 286 L236 200 L300 252 L388 150"
        stroke="url(#lime)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Arrow head -->
  <path d="M344 150 L392 150 L392 198"
        stroke="url(#lime)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Verified dot -->
  <circle cx="370" cy="356" r="40" fill="url(#lime)"/>
  <path d="M352 356 l12 12 l24 -26" stroke="#0A1A2B" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
