<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="NominIA">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="check" x1="300" y1="300" x2="420" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- App tile -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#bg)"/>

  <!-- Payslip document -->
  <g filter="url(#sh)">
    <rect x="150" y="120" width="212" height="272" rx="28" fill="#FFFFFF"/>
  </g>

  <!-- Payslip lines (salary rows) -->
  <rect x="184" y="166" width="144" height="20" rx="10" fill="#CBD5E1"/>
  <rect x="184" y="208" width="104" height="16" rx="8" fill="#E2E8F0"/>
  <rect x="184" y="244" width="124" height="16" rx="8" fill="#E2E8F0"/>
  <rect x="184" y="280" width="86" height="16" rx="8" fill="#E2E8F0"/>

  <!-- Euro mark -->
  <text x="300" y="200" font-family="Outfit, Arial, sans-serif" font-size="56" font-weight="800" fill="#2563EB" text-anchor="middle">€</text>

  <!-- Verified check badge -->
  <circle cx="356" cy="356" r="66" fill="url(#check)" stroke="#FFFFFF" stroke-width="12"/>
  <path d="M328 356 l20 20 l40 -44" stroke="#FFFFFF" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
